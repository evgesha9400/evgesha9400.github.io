name: Check external documentation links

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check public links
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check external documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config ./lychee.toml --verbose --no-progress ./README.md ./docs
