name: Rebuild allowlisted library documentation

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Allowlisted GitHub repository identity
        required: true
        type: choice
        options:
          - evgesha9400/ig-trading-lib
          - evgesha9400/kucoin-futures-lib
      tag:
        description: Canonical v-prefixed semantic-version tag
        required: true
        type: string
      version:
        description: Semantic version without the v prefix
        required: true
        type: string
      commit:
        description: Lowercase 40-character commit SHA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ingest:
    name: Validate and persist an allowlisted release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      portal_commit: ${{ steps.persist.outputs.commit }}
    steps:
      - name: Check out the fixed portal branch
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Require dispatch from the fixed portal branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Library releases must dispatch this workflow on main."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Validate untrusted release selectors before API access
        env:
          LIBRARY_REPOSITORY: ${{ inputs.repository }}
          LIBRARY_TAG: ${{ inputs.tag }}
          LIBRARY_VERSION: ${{ inputs.version }}
          LIBRARY_COMMIT: ${{ inputs.commit }}
        run: >-
          uv run python -m scripts.validate_library_release
          --repository "$LIBRARY_REPOSITORY"
          --tag "$LIBRARY_TAG"
          --version "$LIBRARY_VERSION"
          --commit "$LIBRARY_COMMIT"

      - name: Fetch fixed public release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          LIBRARY_REPOSITORY: ${{ inputs.repository }}
          LIBRARY_TAG: ${{ inputs.tag }}
          API_DIRECTORY: ${{ runner.temp }}/library-release-api
        run: |
          set -euo pipefail
          mkdir -p "$API_DIRECTORY"
          gh api "repos/$LIBRARY_REPOSITORY/releases/tags/$LIBRARY_TAG" \
            > "$API_DIRECTORY/release.json"
          gh api "repos/$LIBRARY_REPOSITORY/git/ref/tags/$LIBRARY_TAG" \
            > "$API_DIRECTORY/tag-reference.json"
          gh api --method GET "repos/$LIBRARY_REPOSITORY/contents/docs/library.yml" \
            -f "ref=$LIBRARY_TAG" > "$API_DIRECTORY/manifest.json"

          if uv run python -c '
          import json
          import re
          import sys

          response = json.load(open(sys.argv[1], encoding="utf-8"))
          object_data = response.get("object", {})
          is_annotated_tag = (
              object_data.get("type") == "tag"
              and isinstance(object_data.get("sha"), str)
              and re.fullmatch(r"[0-9a-f]{40}", object_data["sha"])
          )
          raise SystemExit(0 if is_annotated_tag else 1)
          ' "$API_DIRECTORY/tag-reference.json"; then
            annotated_sha="$(uv run python -c '
            import json
            import sys

            response = json.load(open(sys.argv[1], encoding="utf-8"))
            print(response["object"]["sha"])
            ' "$API_DIRECTORY/tag-reference.json")"
            gh api "repos/$LIBRARY_REPOSITORY/git/tags/$annotated_sha" \
              > "$API_DIRECTORY/annotated-tag.json"
          fi

      - name: Generate and persist derived portal content
        env:
          LIBRARY_REPOSITORY: ${{ inputs.repository }}
          LIBRARY_TAG: ${{ inputs.tag }}
          LIBRARY_VERSION: ${{ inputs.version }}
          LIBRARY_COMMIT: ${{ inputs.commit }}
          API_DIRECTORY: ${{ runner.temp }}/library-release-api
          PUBLICATION_DIRECTORY: ${{ runner.temp }}/library-release-publication
        run: |
          set -euo pipefail
          annotated_tag_args=()
          if [[ -f "$API_DIRECTORY/annotated-tag.json" ]]; then
            annotated_tag_args=(--annotated-tag-response "$API_DIRECTORY/annotated-tag.json")
          fi
          uv run python -m scripts.library_release_publication \
            --repository "$LIBRARY_REPOSITORY" \
            --tag "$LIBRARY_TAG" \
            --version "$LIBRARY_VERSION" \
            --commit "$LIBRARY_COMMIT" \
            --release-response "$API_DIRECTORY/release.json" \
            --tag-reference-response "$API_DIRECTORY/tag-reference.json" \
            --manifest-response "$API_DIRECTORY/manifest.json" \
            --output-directory "$PUBLICATION_DIRECTORY" \
            --portal-directory "$GITHUB_WORKSPACE" \
            "${annotated_tag_args[@]}"

      - id: persist
        name: Commit only portal-derived release content
        env:
          LIBRARY_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- catalog/releases docs/includes
          if ! git diff --cached --quiet; then
            git commit -m "chore(docs): publish release v$LIBRARY_VERSION"
            git push origin HEAD:main
          fi
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build Pages artifact
    needs: ingest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the persisted portal commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.ingest.outputs.portal_commit }}

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Build the portal strictly
        run: uv run mkdocs build --strict

      - name: Check generated local links and anchors
        run: uv run python scripts/check_links.py --site site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy Pages artifact
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
