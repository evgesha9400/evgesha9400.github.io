site_name: Evgeny Aleshin
site_description: Developer documentation for Evgeny Aleshin's maintained public libraries.
site_url: https://evgesha9400.github.io
repo_url: https://github.com/evgesha9400/evgesha9400.github.io
repo_name: evgesha9400.github.io

theme:
  name: material
  language: en
  custom_dir: overrides
  font: false
  icon:
    logo: material/library-shelves
    repo: fontawesome/brands/github
  favicon: assets/images/favicon.svg
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Home prototypes:
      - Compare directions: prototypes/index.md
      - Editorial registry: prototypes/editorial-registry.md
      - Systems console: prototypes/systems-console.md
      - Library constellation: prototypes/library-constellation.md
  - Libraries:
      - IG Trading Library: libraries/ig-trading-lib.md
      - KuCoin Futures Library: libraries/kucoin-futures-lib.md
  - Catalogue contract: catalogue-contract.md

plugins: [search]

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/evgesha9400
      name: Evgeny Aleshin on GitHub

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/prototypes.css

copyright: Copyright &copy; 2026 Evgeny Aleshin
